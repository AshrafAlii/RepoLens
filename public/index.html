<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepoLens</title>

  <!-- Favicon inline SVG as data URI -->
  <link rel="icon" type="image/svg+xml" href="logo.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #111120;
      --surface2: #181828;
      --surface3: #1e1e32;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #f4f4f8;
      --text2: #9898b0;
      --text3: #5a5a78;
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --gold-glow: rgba(201,168,76,0.18);
      --gold-dim: rgba(201,168,76,0.08);
      --danger: #e05555;
      --danger-dim: rgba(224,85,85,0.1);
      --green: #4caf7d;
      --pdf: #e07b45;
      --pdf-dim: rgba(224,123,69,0.1);
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Geist', sans-serif;
      --serif: 'Cormorant Garamond', serif;
      --shadow: 0 24px 64px rgba(0,0,0,0.65);
      --shadow-sm: 0 4px 20px rgba(0,0,0,0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 18px;
      font-weight: 500;
      line-height: 1.6;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; top: -250px; left: -250px;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .layout { display: flex; min-height: 100dvh; position: relative; z-index: 1; }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: 272px; min-width: 272px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 28px 22px;
      position: sticky; top: 0;
      height: 100dvh; overflow-y: auto;
    }

    /* ── Brand / Logo ─────────────────────────────────────── */
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }

    .logo-mark {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 12px;
      display: grid; place-items: center;
      position: relative; overflow: hidden;
    }

    .logo-svg { width: 44px; height: 44px; border-radius: 12px; display: block; }

    .brand-text { display: flex; flex-direction: column; }

    .brand-name {
      font-family: var(--serif);
      font-size: 24px; font-weight: 600;
      letter-spacing: 0.01em; line-height: 1.1;
    }

    .brand-tagline {
      font-size: 10.5px; color: var(--text3);
      letter-spacing: 0.14em; text-transform: uppercase; margin-top: 3px;
    }

    /* ── Upload card ─────────────────────────────────────── */
    .upload-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 18px;
      transition: border-color .2s;
    }

    .upload-card.drag-over { border-color: var(--gold); background: var(--gold-dim); }

    .upload-zone {
      border: 1.5px dashed var(--border2); border-radius: var(--radius-sm);
      padding: 22px 16px; text-align: center; cursor: pointer;
      position: relative; transition: all .2s;
    }

    .upload-zone:hover { border-color: var(--gold); background: var(--gold-dim); }

    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }

    .uz-icon {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--surface3); border: 1px solid var(--border2);
      display: grid; place-items: center; margin: 0 auto 10px;
    }

    .uz-title { font-size: 14.5px; font-weight: 500; margin-bottom: 3px; }
    .uz-hint { font-size: 12px; color: var(--text3); letter-spacing: 0.03em; }

    .upload-progress { margin-top: 12px; display: none; }

    .prog-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .prog-name { font-size: 11px; color: var(--text2); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prog-pct { font-size: 11px; color: var(--gold); font-weight: 600; }
    .prog-track { height: 2px; background: var(--surface3); border-radius: 100px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 100px; width: 0%; transition: width .3s; }

    /* ── Stats ───────────────────────────────────────────── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }

    .stat-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 10px;
    }

    .stat-val { font-family: var(--serif); font-size: 30px; font-weight: 600; color: var(--gold2); line-height: 1; margin-bottom: 3px; }
    .stat-lbl { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; }

    /* ── Sidebar nav ──────────────────────────────────────── */
    .sidebar-nav { margin-top: auto; padding-top: 18px; border-top: 1px solid var(--border); }

    .nav-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      color: var(--text3); font-size: 13.5px; cursor: pointer;
      border: none; background: none; width: 100%; text-align: left;
      font-family: var(--font); transition: all .15s; letter-spacing: 0.01em;
    }

    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: var(--gold-dim); color: var(--gold2); }

    /* ── Main area ───────────────────────────────────────── */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    /* ── Top bar with tabs ───────────────────────────────── */
    .topbar {
      padding: 28px 40px 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky; top: 0; z-index: 40;
    }

    .topbar-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 20px; }

    .page-title { font-family: var(--serif); font-size: 40px; font-weight: 600; line-height: 1.05; letter-spacing: 0.01em; }
    .page-title span { background: linear-gradient(135deg, var(--gold), var(--gold2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .page-sub { color: var(--text3); font-size: 15px; font-weight: 500; margin-top: 5px; letter-spacing: 0.02em; }

    .refresh-btn {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text2); padding: 10px 18px;
      border-radius: 100px; font-family: var(--font);
      font-size: 13px; font-weight: 400; cursor: pointer;
      transition: all .2s; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.02em;
    }

    .refresh-btn:hover { border-color: var(--gold); color: var(--gold2); background: var(--gold-dim); }
    .refresh-btn svg { transition: transform .4s; }
    .refresh-btn:hover svg { transform: rotate(180deg); }

    /* ── Tabs ────────────────────────────────────────────── */
    .tabs { display: flex; gap: 2px; }

    .tab {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 18px; border-radius: 10px 10px 0 0;
      font-size: 15px; font-weight: 600; cursor: pointer;
      border: none; background: none; font-family: var(--font);
      color: var(--text3); border-bottom: 2px solid transparent;
      transition: all .15s; position: relative; top: 1px; letter-spacing: 0.02em;
    }

    .tab:hover { color: var(--text2); background: rgba(255,255,255,0.03); }

    .tab.active { color: var(--text); border-bottom-color: var(--gold); }

    .tab .tab-count {
      background: var(--surface3); border-radius: 100px;
      padding: 2px 7px; font-size: 10px; font-weight: 600;
    }

    .tab.active .tab-count { background: var(--gold-dim); color: var(--gold2); }
    .tab[data-tab="pdf"].active { border-bottom-color: var(--pdf); }
    .tab[data-tab="pdf"].active .tab-count { background: var(--pdf-dim); color: var(--pdf); }

    /* ── Content area ────────────────────────────────────── */
    .content { padding: 28px 40px 80px; flex: 1; }

    /* ── Gallery grid ────────────────────────────────────── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
    }

    /* ── Media card ──────────────────────────────────────── */
    .media-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; cursor: pointer;
      transition: transform .25s, box-shadow .25s, border-color .25s;
      position: relative; animation: fadeUp .4s ease both;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

    .media-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--border2); }

    .media-thumb { aspect-ratio: 1; overflow: hidden; background: var(--surface2); position: relative; }

    .media-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s cubic-bezier(.25,.46,.45,.94); }
    .media-card:hover .media-thumb img { transform: scale(1.07); }

    /* Video thumbnail */
    .vid-thumb-wrap {
      width: 100%; height: 100%; position: relative; overflow: hidden;
      background: var(--surface2);
    }

    .vid-thumb-wrap video {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .4s cubic-bezier(.25,.46,.45,.94);
    }

    .media-card:hover .vid-thumb-wrap video { transform: scale(1.07); }

    .vid-play-badge {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      background: rgba(8,8,16,0.28);
      transition: background .2s;
    }

    .media-card:hover .vid-play-badge { background: rgba(8,8,16,0.15); }

    .vid-play-circle {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(8,8,16,0.55); backdrop-filter: blur(6px);
      border: 1.5px solid rgba(255,255,255,0.35);
      display: grid; place-items: center;
      transition: transform .2s, background .2s;
    }

    .media-card:hover .vid-play-circle { transform: scale(1.1); background: rgba(201,168,76,0.35); border-color: var(--gold); }

    /* Video placeholder (fallback if thumbnail fails) */
    .vid-ph {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--surface2), var(--surface3));
    }

    .vid-ph-icon {
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.25);
      display: grid; place-items: center; transition: transform .25s;
    }

    .media-card:hover .vid-ph-icon { transform: scale(1.1); }
    .vid-ph span { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

    /* PDF placeholder */
    .pdf-ph {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, #1a120a, #120c06);
    }

    .pdf-ph-icon {
      width: 50px; height: 50px; border-radius: 12px;
      background: rgba(224,123,69,0.12); border: 1px solid rgba(224,123,69,0.25);
      display: grid; place-items: center; transition: transform .25s;
    }

    .media-card:hover .pdf-ph-icon { transform: scale(1.1); }
    .pdf-ph span { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

    /* ── Overlay actions ──────────────────────────────────── */
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(8,8,16,0.88) 0%, transparent 55%);
      opacity: 0; transition: opacity .25s;
      display: flex; align-items: flex-end; padding: 12px;
    }

    .media-card:hover .card-overlay { opacity: 1; }

    .ov-acts { display: flex; gap: 7px; width: 100%; }

    .ov-btn {
      flex: 1; padding: 8px 4px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07); backdrop-filter: blur(8px);
      color: #fff; font-family: var(--font); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }

    .ov-btn:hover { background: rgba(255,255,255,0.16); }
    .ov-btn.del:hover { background: var(--danger); border-color: var(--danger); }

    /* Type badge */
    .tbadge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(8,8,16,0.72); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
      padding: 3px 8px; font-size: 9px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text2); font-weight: 600;
    }

    .tbadge.vid { color: var(--gold2); border-color: rgba(201,168,76,0.3); }
    .tbadge.pdf-badge { color: var(--pdf); border-color: rgba(224,123,69,0.35); }

    /* Card footer */
    .card-footer { padding: 11px 13px; border-top: 1px solid var(--border); }
    .card-name { font-size: 14px; font-weight: 600; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.01em; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 3px; }
    .card-type { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
    .card-size { font-size: 12px; font-weight: 500; color: var(--text3); }

    /* ── PDF list view ───────────────────────────────────── */
    .pdf-list { display: flex; flex-direction: column; gap: 10px; }

    .pdf-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color .2s, background .2s;
      animation: fadeUp .3s ease both;
    }

    .pdf-row:hover { border-color: rgba(224,123,69,0.35); background: rgba(224,123,69,0.03); }

    .pdf-row-icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: var(--pdf-dim); border: 1px solid rgba(224,123,69,0.2);
      display: grid; place-items: center;
    }

    .pdf-row-info { flex: 1; min-width: 0; }
    .pdf-row-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.01em; }
    .pdf-row-meta { font-size: 13px; font-weight: 500; color: var(--text3); margin-top: 2px; letter-spacing: 0.02em; }

    .pdf-row-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .pdf-act {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 13px; border-radius: 8px;
      border: 1px solid var(--border2); background: none;
      color: var(--text2); font-family: var(--font);
      font-size: 12px; font-weight: 400; cursor: pointer;
      transition: all .15s; white-space: nowrap; letter-spacing: 0.02em;
    }

    .pdf-act:hover { color: var(--text); background: var(--surface2); }
    .pdf-act.del:hover { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
    .pdf-act.dl:hover { background: var(--gold-dim); border-color: var(--gold); color: var(--gold2); }

    /* ── Skeleton ────────────────────────────────────────── */
    .skel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .skel-thumb { aspect-ratio: 1; background: var(--surface2); position: relative; overflow: hidden; }
    .skel-foot { padding: 11px 13px; border-top: 1px solid var(--border); }
    .skel-line { height: 10px; background: var(--surface3); border-radius: 100px; margin-bottom: 5px; position: relative; overflow: hidden; }
    .skel-line.s { width: 55%; }

    .skel-thumb::after, .skel-line::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      animation: shimmer 1.6s infinite;
    }

    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

    .skel-pdf-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
    .skel-pdf-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--surface2); flex-shrink: 0; position: relative; overflow: hidden; }
    .skel-pdf-icon::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); animation: shimmer 1.6s infinite; }
    .skel-pdf-info { flex: 1; }

    /* ── Empty state ──────────────────────────────────────── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px; text-align: center;
    }

    .empty-ico {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border2);
      display: grid; place-items: center; margin-bottom: 18px;
    }

    .empty-title { font-family: var(--serif); font-size: 24px; font-weight: 400; color: var(--text2); margin-bottom: 7px; letter-spacing: 0.01em; }
    .empty-desc { font-size: 14px; color: var(--text3); max-width: 240px; letter-spacing: 0.02em; }

    /* ── Modal ───────────────────────────────────────────── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(4,4,12,0.96); backdrop-filter: blur(14px);
      z-index: 200; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 20px;
    }

    .modal.open { display: flex; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-bar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 16px 22px; display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(4,4,12,0.88), transparent);
    }

    .modal-fname { font-size: 13px; color: var(--text2); max-width: calc(100% - 200px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0.02em; }

    .modal-acts { display: flex; gap: 8px; }

    .mbtn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 15px; border-radius: 100px;
      border: 1px solid var(--border2); background: var(--surface2);
      color: var(--text2); font-family: var(--font);
      font-size: 12.5px; font-weight: 400; cursor: pointer; transition: all .15s; letter-spacing: 0.02em;
    }

    .mbtn:hover { color: var(--text); background: var(--surface3); }
    .mbtn.del:hover { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
    .mbtn.download:hover { background: var(--gold-dim); border-color: var(--gold); color: var(--gold2); }

    .modal-media { 
      width: 100%; height: calc(100dvh - 80px);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    .modal-slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      will-change: transform, opacity;
      pointer-events: auto;
    }

    .modal-slide img {
      max-width: min(92vw, 960px); max-height: calc(100dvh - 120px);
      border-radius: var(--radius); box-shadow: var(--shadow);
      object-fit: contain; user-select: none; -webkit-user-drag: none;
    }

    .modal-slide video {
      max-width: min(92vw, 960px); max-height: calc(100dvh - 120px);
      border-radius: var(--radius); box-shadow: var(--shadow); outline: none;
    }

    @keyframes zoomIn { from { transform: scale(0.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Modal nav arrows ────────────────────────────────── */
    .modal-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .2s, opacity .2s;
      z-index: 10;
    }

    .modal-nav.prev { left: 20px; }
    .modal-nav.next { right: 20px; }
    .modal-nav:hover { background: rgba(201,168,76,0.25); border-color: var(--gold); transform: translateY(-50%) scale(1.08); }
    .modal-nav.hidden { opacity: 0; pointer-events: none; }

    .modal-counter {
      font-size: 12px; color: var(--text3); font-weight: 500;
      letter-spacing: 0.06em; margin-right: 4px; white-space: nowrap;
    }

    @media (max-width: 680px) {
      .modal-nav { width: 42px; height: 42px; }
      .modal-nav.prev { left: 10px; }
      .modal-nav.next { right: 10px; }
    }

    /* ── Confirm dialog ───────────────────────────────────── */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(4,4,12,0.82); backdrop-filter: blur(10px);
      z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px;
    }

    .confirm-overlay.open { display: flex; }

    .confirm-box { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 26px; max-width: 340px; width: 100%; box-shadow: var(--shadow); animation: zoomIn .2s ease; }
    .confirm-title { font-family: var(--serif); font-size: 22px; font-weight: 400; margin-bottom: 8px; letter-spacing: 0.01em; }
    .confirm-desc { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
    .confirm-fname { color: var(--text); font-weight: 500; }
    .confirm-btns { display: flex; gap: 10px; }

    .c-cancel { flex: 1; padding: 11px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: none; color: var(--text2); font-family: var(--font); font-size: 14px; font-weight: 400; cursor: pointer; transition: all .15s; letter-spacing: 0.02em; }
    .c-cancel:hover { background: var(--surface3); color: var(--text); }
    .c-del { flex: 1; padding: 11px; border-radius: var(--radius-sm); border: none; background: var(--danger); color: #fff; font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; letter-spacing: 0.02em; }
    .c-del:hover { opacity: .85; }

    /* ── PDF Preview Modal ───────────────────────────────── */
    .pdf-modal {
      position: fixed; inset: 0;
      background: rgba(4,4,12,0.97);
      backdrop-filter: blur(14px);
      z-index: 200; display: none;
      flex-direction: column;
    }

    .pdf-modal.open { display: flex; animation: fadeIn .2s ease; }

    .pdf-modal-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px; flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .pdf-modal-left {
      display: flex; align-items: center; gap: 10px;
      min-width: 0; flex: 1;
    }

    .pdf-modal-icon {
      width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
      background: var(--pdf-dim); border: 1px solid rgba(224,123,69,0.25);
      display: grid; place-items: center;
    }

    .pdf-modal-fname {
      font-size: 13px; color: var(--text2);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .pdf-modal-acts { display: flex; gap: 8px; flex-shrink: 0; margin-left: 16px; }

    .pdf-modal-body {
      flex: 1; position: relative; overflow: hidden;
    }

    .pdf-frame {
      width: 100%; height: 100%;
      border: none; display: block;
      background: #fff;
    }

    .pdf-loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: var(--bg);
      font-size: 13px; color: var(--text3); letter-spacing: 0.05em;
    }

    .pdf-loading.hidden { display: none; }

    .pdf-loading-spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid var(--border2);
      border-top-color: var(--pdf);
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ───────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 100px; padding: 12px 24px;
      font-size: 13.5px; font-weight: 400; white-space: nowrap;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; pointer-events: none;
      box-shadow: var(--shadow-sm); letter-spacing: 0.02em;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { color: var(--green); }
    .toast.error { color: var(--danger); }

    /* ── Sidebar credit ──────────────────────────────────── */
    .sidebar-credit {
      margin-top: auto; padding-top: 20px;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text3);
      letter-spacing: 0.06em; text-transform: uppercase;
      border-top: 1px solid var(--border);
      padding-top: 16px; margin-top: 24px;
    }

    .credit-name {
      font-family: var(--serif); font-size: 14px;
      font-weight: 600; font-style: italic;
      color: var(--gold); letter-spacing: 0.04em;
      text-transform: none;
    }

    .mob-by {
      font-size: 10px; color: var(--gold);
      font-family: var(--serif); font-style: italic;
      font-weight: 500; letter-spacing: 0.04em;
      margin-left: 2px; opacity: 0.85;
    }

    /* ── Mobile header ───────────────────────────────────── */
    .mob-header {
      display: none; align-items: center; justify-content: space-between;
      padding: 13px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }

    .mob-brand { display: flex; align-items: center; gap: 9px; }
    .mob-brand-name { font-family: var(--serif); font-size: 21px; font-weight: 600; letter-spacing: 0.01em; }

    .mob-sync { display: flex; align-items: center; gap: 5px; background: none; border: 1px solid var(--border2); color: var(--text2); padding: 7px 14px; border-radius: 100px; font-family: var(--font); font-size: 12px; cursor: pointer; transition: all .2s; letter-spacing: 0.02em; }
    .mob-sync:hover { border-color: var(--gold); color: var(--gold2); }

    /* Mobile tabs */
    .mob-tabs {
      display: none; gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }

    .mob-tabs .tab { border-radius: 0; font-size: 14px; font-weight: 600; padding: 11px 16px; }

    /* ── FAB ─────────────────────────────────────────────── */
    .fab {
      display: none; position: fixed; bottom: 22px; right: 22px;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none; box-shadow: 0 8px 32px rgba(201,168,76,0.4);
      cursor: pointer; place-items: center; z-index: 50;
      transition: transform .2s;
    }

    .fab:hover { transform: scale(1.08); }
    .fab input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; border-radius: 50%; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 960px) {
      .sidebar { width: 240px; min-width: 240px; padding: 22px 16px; }
      .topbar { padding: 22px 28px 0; }
      .content { padding: 22px 28px 80px; }
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    }

    @media (max-width: 680px) {
      .sidebar { display: none; }
      .mob-header { display: flex; }
      .mob-tabs { display: flex; }
      .fab { display: grid; }

      .topbar { display: none; }
      .content { padding: 14px 12px 100px; }

      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }

      .media-card { border-radius: var(--radius-sm); }
      .media-card:hover { transform: none; box-shadow: none; }
      .card-footer { display: block; padding: 10px 12px; }
      .card-name { font-size: 13px; }
      .card-overlay { opacity: 1; background: linear-gradient(to top, rgba(8,8,16,0.7) 0%, transparent 50%); }
      .ov-acts { justify-content: flex-end; gap: 5px; }
      .ov-btn { flex: 0; padding: 8px 10px; }
      .ov-btn span { display: none; }

      .pdf-row-actions .pdf-act span { font-size: 13px; }
      .pdf-row { padding: 14px 12px; }
      .pdf-row-name { font-size: 15px; }
      .pdf-row-meta { font-size: 12px; }
    }

    @media (max-width: 360px) {
      .gallery-grid { grid-template-columns: repeat(1, 1fr); }
    }
  </style>
</head>
<body>

<div class="layout">

<script>
  // ── State ──────────────────────────────────────────────
  let allMedia = [];
  let activeTab = 'all';
  let pendingDel = null;

  // ── Helpers ────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function fmt(bytes) {
    if (!bytes) return '';
    if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  // ── Toast ──────────────────────────────────────────────
  let toastT;
  function toast(msg, type = 'success') {
    clearTimeout(toastT);
    const el = $('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    toastT = setTimeout(() => el.classList.remove('show'), 3200);
  }

  // ── Upload ─────────────────────────────────────────────
  $('fileInput').addEventListener('change', e => doUpload(e.target.files));
  $('mobInput').addEventListener('change', e => doUpload(e.target.files));

  const uploadZone = $('uploadZone');
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); $('uploadCard').classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => $('uploadCard').classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => { e.preventDefault(); $('uploadCard').classList.remove('drag-over'); doUpload(e.dataTransfer.files); });

  // ── GitHub config (fetched once) ──────────────────────
  let ghConfig = null;
  async function getConfig() {
    if (ghConfig) return ghConfig;
    const res = await fetch('/api/config');
    ghConfig = await res.json();
    return ghConfig;
  }

  async function doUpload(files) {
    if (!files?.length) return;
    const total = files.length;
    $('uploadProgress').style.display = 'block';
    $('fileInput').disabled = true;
    let successCount = 0;

    const cfg = await getConfig();

    for (let i = 0; i < total; i++) {
      const file = files[i];
      const pct = Math.round((i / total) * 100);
      $('progFill').style.width = pct + '%';
      $('progPct').textContent = pct + '%';
      $('progName').textContent = file.name;

      try {
        // Read file as base64 directly in browser
        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });

        // Clean filename
        const ext = file.name.split('.').pop().toLowerCase();
        const baseName = file.name
          .replace(/\.[^/.]+$/, '')
          .replace(/[^a-zA-Z0-9\-_. ]/g, '')
          .replace(/\s+/g, '_')
          .replace(/_+/g, '_')
          .trim();
        const safeName = `${baseName}.${ext}`;
        const filePath = `media/${safeName}`;
        const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${filePath}`;

        // Check if file already exists (need SHA to overwrite)
        let sha;
        const checkRes = await fetch(`${url}?ref=${cfg.branch}`, {
          headers: {
            Authorization: `Bearer ${cfg.token}`,
            Accept: 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
          }
        });
        if (checkRes.ok) {
          const existing = await checkRes.json();
          sha = existing.sha;
        }

        // Upload directly to GitHub
        const uploadRes = await fetch(url, {
          method: 'PUT',
          headers: {
            Authorization: `Bearer ${cfg.token}`,
            Accept: 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
            'Content-Type': 'application/json',
            'User-Agent': 'github-media-vault',
          },
          body: JSON.stringify({
            message: `Upload ${safeName}`,
            content: base64,
            branch: cfg.branch,
            ...(sha ? { sha } : {}),
          }),
        });

        if (!uploadRes.ok) {
          const errBody = await uploadRes.json().catch(() => ({}));
          throw new Error(errBody.message || 'GitHub upload failed');
        }

        successCount++;
      } catch (err) {
        toast('✗ ' + file.name + ': ' + err.message, 'error');
      }
    }

    $('progFill').style.width = '100%';
    $('progPct').textContent = '100%';
    $('progName').textContent = 'Done!';
    setTimeout(() => {
      $('uploadProgress').style.display = 'none';
      $('progFill').style.width = '0%';
      $('fileInput').disabled = false;
      $('fileInput').value = '';
      $('mobInput').value = '';
    }, 700);

    if (successCount > 0) toast(`✓ ${successCount} file${successCount > 1 ? 's' : ''} uploaded`);
    loadAll();
  }

  // ── Load all media ─────────────────────────────────────
  async function loadAll() {
    renderSkeletons();
    try {
      const res = await fetch('/api/media');
      if (!res.ok) throw new Error('Failed to load');
      allMedia = await res.json();
      updateCounts();
      renderTab(activeTab);
    } catch (err) {
      $('contentArea').innerHTML = '';
      $('pageSub').textContent = 'Could not load media';
      toast('✗ ' + err.message, 'error');
    }
  }

  function updateCounts() {
    const total   = allMedia.length;
    const photos  = allMedia.filter(m => m.type === 'image').length;
    const videos  = allMedia.filter(m => m.type === 'video').length;
    const pdfs    = allMedia.filter(m => m.type === 'pdf').length;

    $('statPhotos').textContent = photos;
    $('statVideos').textContent = videos;
    $('statPdfs').textContent   = pdfs;

    $('pageSub').textContent = `${total} file${total !== 1 ? 's' : ''} stored in your vault`;

    // Desktop tabs
    $('dt-cnt-all').textContent   = total;
    $('dt-cnt-image').textContent = photos;
    $('dt-cnt-video').textContent = videos;
    $('dt-cnt-pdf').textContent   = pdfs;

    // Mobile tabs
    $('mob-cnt-all').textContent   = total;
    $('mob-cnt-image').textContent = photos;
    $('mob-cnt-video').textContent = videos;
    $('mob-cnt-pdf').textContent   = pdfs;
  }

  function emptyState(tab) {

      video: ['No videos yet', 'Upload video files to see them here.'],

  }

  // ── Download ───────────────────────────────────────────
  async function downloadFile(url, filename) {
    try {
      toast('⬇ Downloading…');
      const res = await fetch(url);
      if (!res.ok) throw new Error('Download failed');
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
      toast('✓ Downloaded: ' + filename);
    } catch (err) {
      toast('✗ ' + err.message, 'error');
    }
  }

  // ── Modal ──────────────────────────────────────────────
  let modalItems = [];
  let modalIdx = null;
  let currentSlide = null;
  let isAnimating = false;

  function openModal(idx, items) {
    modalItems = items.filter(m => m.type === 'image' || m.type === 'video');
    const item = items[idx];
    if (!item) return;
    const filteredIdx = modalItems.findIndex(m => m.sha === item.sha);
    modalIdx = filteredIdx >= 0 ? filteredIdx : 0;
    $('modalMedia').innerHTML = '';
    currentSlide = null;
    isAnimating = false;
    renderModal(0);
    $('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function buildSlide(item) {
    const el = document.createElement('div');
    el.className = 'modal-slide';
    el.innerHTML = item.type === 'video'
      ? `<video controls autoplay playsinline><source src="${item.download_url}" /></video>`
      : `<img src="${item.download_url}" alt="${item.name}" draggable="false" />`;
    return el;
  }

  function renderModal(dir) {
    const item = modalItems[modalIdx];
    if (!item) return;

    $('modalFname').textContent = item.name;
    $('modalCounter').textContent = `${modalIdx + 1} / ${modalItems.length}`;
    $('modal').dataset.src = JSON.stringify(item);
    $('modalPrev').classList.toggle('hidden', modalIdx === 0);
    $('modalNext').classList.toggle('hidden', modalIdx === modalItems.length - 1);

    const W = window.innerWidth;
    const newSlide = buildSlide(item);
    const media = $('modalMedia');

    if (!currentSlide || dir === 0) {
      // First open — just zoom in
      media.innerHTML = '';
      newSlide.style.transform = 'scale(0.92)';
      newSlide.style.opacity = '0';
      media.appendChild(newSlide);
      currentSlide = newSlide;
      requestAnimationFrame(() => {
        newSlide.style.transition = 'transform 0.32s cubic-bezier(0.34,1.4,0.64,1), opacity 0.25s ease';
        newSlide.style.transform = 'scale(1)';
        newSlide.style.opacity = '1';
      });
      return;
    }

    // Slide in from side
    isAnimating = true;
    const outgoing = currentSlide;
    newSlide.style.transform = `translateX(${dir > 0 ? W : -W}px)`;
    newSlide.style.opacity = '1';
    media.appendChild(newSlide);
    currentSlide = newSlide;

    requestAnimationFrame(() => {
      const easing = 'cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      outgoing.style.transition = `transform 0.36s ${easing}, opacity 0.28s ease`;
      newSlide.style.transition  = `transform 0.36s ${easing}`;
      outgoing.style.transform = `translateX(${dir > 0 ? -W * 0.3 : W * 0.3}px)`;
      outgoing.style.opacity = '0';
      newSlide.style.transform = 'translateX(0)';
      setTimeout(() => { outgoing.remove(); isAnimating = false; }, 380);
    });
  }

  function modalNavigate(dir) {
    if (isAnimating) return;
    const next = modalIdx + dir;
    if (next < 0 || next >= modalItems.length) return;
    modalIdx = next;
    renderModal(dir);
  }

  function closeModal(animateDir) {
    const modal = $('modal');
    if (!modal.classList.contains('open')) return;

    if (animateDir === 'down' && currentSlide) {
      // Swipe-down dismiss — fly off screen
      currentSlide.style.transition = 'transform 0.32s cubic-bezier(0.55,0,1,0.45), opacity 0.28s ease';
      currentSlide.style.transform = 'translateY(100vh) scale(0.85)';
      currentSlide.style.opacity = '0';
      modal.style.transition = 'opacity 0.32s ease';
      modal.style.opacity = '0';
      setTimeout(() => {
        modal.classList.remove('open');
        modal.style.opacity = '';
        modal.style.transition = '';
        $('modalMedia').innerHTML = '';
        document.body.style.overflow = '';
        currentSlide = null; modalItems = []; modalIdx = null;
      }, 340);
    } else {
      modal.classList.remove('open');
      $('modalMedia').innerHTML = '';
      document.body.style.overflow = '';
      currentSlide = null; modalItems = []; modalIdx = null;
    }
  }

  $('modalClose').addEventListener('click', () => closeModal());
  $('modalPrev').addEventListener('click', e => { e.stopPropagation(); modalNavigate(-1); });
  $('modalNext').addEventListener('click', e => { e.stopPropagation(); modalNavigate(+1); });
  $('modal').addEventListener('click', e => {
    // Only close if clicking the dark backdrop itself, not any child
    if (e.target === $('modal')) closeModal();
  });

  $('modalDownload').addEventListener('click', () => {
    const item = JSON.parse($('modal').dataset.src || 'null');
    if (item) downloadFile(item.download_url, item.name);
  });

  $('modalDel').addEventListener('click', () => {
    const item = JSON.parse($('modal').dataset.src || 'null');
    if (!item) return;
    closeModal();
    const idx = allMedia.findIndex(m => m.sha === item.sha);
    if (idx !== -1) openConfirm(idx, allMedia);
  });

  // ── Touch: live-tracking swipe (horizontal = navigate, vertical = dismiss) ──
  let touch = { startX: 0, startY: 0, dx: 0, dy: 0, active: false, axis: null };

  $('modal').addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    touch.startX = e.touches[0].clientX;
    touch.startY = e.touches[0].clientY;
    touch.dx = 0; touch.dy = 0;
    touch.active = true; touch.axis = null;
  }, { passive: true });

  $('modal').addEventListener('touchmove', e => {
    if (!touch.active || !currentSlide) return;
    touch.dx = e.touches[0].clientX - touch.startX;
    touch.dy = e.touches[0].clientY - touch.startY;

    // Lock axis after first 8px of movement
    if (!touch.axis) {
      if (Math.abs(touch.dx) > 8 || Math.abs(touch.dy) > 8) {
        touch.axis = Math.abs(touch.dx) > Math.abs(touch.dy) ? 'x' : 'y';
      } else return;
    }

    if (touch.axis === 'x') {
      // Horizontal: drag the slide live
      const resistance = 0.45;
      const atEdge = (touch.dx > 0 && modalIdx === 0) || (touch.dx < 0 && modalIdx === modalItems.length - 1);
      const move = atEdge ? touch.dx * resistance : touch.dx;
      currentSlide.style.transition = 'none';
      currentSlide.style.transform = `translateX(${move}px)`;
    } else {
      // Vertical: drag down to dismiss
      if (touch.dy < 0) return; // don't allow upward drag
      const progress = Math.min(touch.dy / 400, 1);
      const scale = 1 - progress * 0.15;
      currentSlide.style.transition = 'none';
      currentSlide.style.transform = `translateY(${touch.dy}px) scale(${scale})`;
      $('modal').style.background = `rgba(4,4,12,${0.97 - progress * 0.6})`;
    }
  }, { passive: true });

  $('modal').addEventListener('touchend', () => {
    if (!touch.active || !currentSlide) { touch.active = false; return; }
    touch.active = false;
    $('modal').style.background = '';

    if (touch.axis === 'x') {
      const W = window.innerWidth;
      const threshold = W * 0.28;
      if (Math.abs(touch.dx) > threshold && !isAnimating) {
        const dir = touch.dx < 0 ? 1 : -1;
        const next = modalIdx + dir;
        if (next >= 0 && next < modalItems.length) {
          // Snap to next item
          const easing = 'cubic-bezier(0.25,0.46,0.45,0.94)';
          currentSlide.style.transition = `transform 0.26s ${easing}`;
          currentSlide.style.transform = `translateX(${touch.dx < 0 ? -W : W}px)`;
          modalIdx = next;
          isAnimating = true;
          const newSlide = buildSlide(modalItems[modalIdx]);
          newSlide.style.transform = `translateX(${touch.dx < 0 ? W : -W}px)`;
          $('modalMedia').appendChild(newSlide);
          requestAnimationFrame(() => {
            newSlide.style.transition = `transform 0.26s ${easing}`;
            newSlide.style.transform = 'translateX(0)';
          });
          setTimeout(() => {
            currentSlide.remove();
            currentSlide = newSlide;
            isAnimating = false;
            // Update header
            const item = modalItems[modalIdx];
            $('modalFname').textContent = item.name;
            $('modalCounter').textContent = `${modalIdx + 1} / ${modalItems.length}`;
            $('modal').dataset.src = JSON.stringify(item);
            $('modalPrev').classList.toggle('hidden', modalIdx === 0);
            $('modalNext').classList.toggle('hidden', modalIdx === modalItems.length - 1);
          }, 280);
          return;
        }
      }
      // Snap back
      currentSlide.style.transition = 'transform 0.3s cubic-bezier(0.34,1.4,0.64,1)';
      currentSlide.style.transform = 'translateX(0)';

    } else if (touch.axis === 'y') {
      if (touch.dy > 120) {
        closeModal('down');
      } else {
        // Snap back
        currentSlide.style.transition = 'transform 0.35s cubic-bezier(0.34,1.4,0.64,1)';
        currentSlide.style.transform = 'translateY(0) scale(1)';
      }
    }
  }, { passive: true });

  // ── Confirm delete ──────────────────────────────────────
  let pendingItem = null;

  function openConfirm(idx, list) {
    pendingItem = list[idx];
    $('cFname').textContent = pendingItem.name;
    $('confirmOverlay').classList.add('open');
  }

  function closeConfirm() { $('confirmOverlay').classList.remove('open'); pendingItem = null; }

  $('cCancel').addEventListener('click', closeConfirm);
  $('confirmOverlay').addEventListener('click', e => { if (e.target === $('confirmOverlay')) closeConfirm(); });

  $('cConfirm').addEventListener('click', async () => {
    if (!pendingItem) return;
    const item = pendingItem;
    closeConfirm();
    try {
      const res = await fetch('/api/media', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: item.path, sha: item.sha }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Delete failed');
      toast('✓ File deleted');
      loadAll();
    } catch (err) {
      toast('✗ ' + err.message, 'error');
    }
  });

  document.addEventListener('keydown', e => {
    if ($('modal').classList.contains('open')) {
      if (e.key === 'ArrowLeft')  { e.preventDefault(); modalNavigate(-1); return; }
      if (e.key === 'ArrowRight') { e.preventDefault(); modalNavigate(+1); return; }
    }
    if (e.key === 'Escape') { closeModal(); closePDFModal(); closeConfirm(); }
  });

  // ── PDF Modal ──────────────────────────────────────────
  function openPDFModal(item) {
    if (!item) return;
    $('pdfModalFname').textContent = item.name;
    $('pdfModal').dataset.src = JSON.stringify(item);
    $('pdfLoading').classList.remove('hidden');
    $('pdfFrame').src = '';
    $('pdfModal').classList.add('open');
    document.body.style.overflow = 'hidden';

    // Load PDF into iframe
    $('pdfFrame').onload = () => $('pdfLoading').classList.add('hidden');
    $('pdfFrame').onerror = () => $('pdfLoading').classList.add('hidden');
    $('pdfFrame').src = item.download_url;
  }

  function closePDFModal() {
    $('pdfModal').classList.remove('open');
    $('pdfFrame').src = '';
    document.body.style.overflow = '';
  }

  $('pdfModalClose').addEventListener('click', closePDFModal);
  $('pdfModal').addEventListener('click', e => { if (e.target === $('pdfModal')) closePDFModal(); });

  $('pdfModalDownload').addEventListener('click', () => {
    const item = JSON.parse($('pdfModal').dataset.src || 'null');
    if (item) downloadFile(item.download_url, item.name);
  });

  $('pdfModalDel').addEventListener('click', () => {
    const item = JSON.parse($('pdfModal').dataset.src || 'null');
    if (!item) return;
    closePDFModal();
    const idx = allMedia.findIndex(m => m.sha === item.sha);
    if (idx !== -1) openConfirm(idx, allMedia);
  });

  // ── Init ───────────────────────────────────────────────
  loadAll();
</script>
</body>
</html>
